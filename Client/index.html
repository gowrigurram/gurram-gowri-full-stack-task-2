<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

    <h2>Welcome Back</h2>

    <p style="font-size:14px; color:gray; margin-top:-10px; margin-bottom:15px;">
        Login to continue your journey
    </p>

    <form id="loginForm">

        <input type="email" id="loginEmail" placeholder="👤 Email" required><br><br>
        
        <input type="password" id="loginPassword" placeholder="🔒 Password" required><br>

        <a href="forgot-password.html" style="font-size:12px; display:block; margin-bottom:10px; text-decoration:none;">
            Forgot Password?
        </a>

        <button type="submit">Login</button>

    </form>

    
    <p style="margin-top:15px; font-size:13px;">
        Continue with
    </p>

    <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
        <a href="#" style="text-decoration:none; font-size:14px;">🔵 Google</a>
        <a href="#" style="text-decoration:none; font-size:14px;">💼 LinkedIn</a>
        <a href="#" style="text-decoration:none; font-size:14px;">📘 Facebook</a>
    </div>

    
    <p style="margin-top:10px; font-size:13px;">
        Don't have an account? 
        <a href="register.html">Register</a>
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
